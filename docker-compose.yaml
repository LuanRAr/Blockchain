  # ─── Cliente Interativo ─────────────────────────────────────────────────────

  client:
    build:
      context: .
      args:
        TARGET: client
    container_name: ormuz_client
    network_mode: host
    stdin_open: true  # mantém stdin aberto para o menu interativo
    tty: true         # aloca pseudo-TTY para formatação correta do terminal
    environment:
      #   NavegacaoNorte | NavegacaoSul | NavegacaoLeste | NavegacaoOeste | ConsorcioGeral
      - COMPANY=NavegacaoNorte
      - LEDGER_NODES=172.16.201.7:7000,172.16.201.10:7000,172.16.201.11:7000,172.16.201.12:7000
      - BROKER_LIST=172.16.201.7:5000,172.16.201.10:5000,172.16.201.11:5000,172.16.201.12:5000