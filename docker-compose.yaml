      - MY_IP=172.16.201.16
      - RING_ADDRS=172.16.201.10:5007,172.16.201.7:5008,172.16.201.8:5011,172.16.201.16:5012
      - LEDGER_NODES=172.16.201.10:7007,172.16.201.7:7008,172.16.201.8:7011,172.16.201.16:7012

  # ─── Sensores ────────────────────────────────────────────────────────────────

  sensor-norte-radar:
