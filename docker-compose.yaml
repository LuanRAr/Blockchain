# docker-compose para rodar o sistema Ormuz distribuído em 4 PCs.
#
# Cada PC sobe apenas o profile do seu setor:
#   docker compose --profile norte up -d   → PC Norte  (172.16.201.10)
#   docker compose --profile sul   up -d   → PC Sul    (172.16.201.7)
#   docker compose --profile leste up -d   → PC Leste  (172.16.201.8)
#   docker compose --profile oeste up -d   → PC Oeste  (172.16.201.16)
#
# IPs reais das máquinas:
#   Norte  172.16.201.10   Sul    172.16.201.7
#   Leste  172.16.201.8    Oeste  172.16.201.16
#
# Portas expostas no host (mesmas de antes):
#   Ledger : 7007 (norte) | 7008 (sul) | 7011 (leste) | 7012 (oeste)
#   Broker : 5007 (norte) | 5008 (sul) | 5011 (leste) | 5012 (oeste)
#
# Os serviços de cada PC usam network_mode: host para que os peers
# externos (outros PCs) possam alcançar as portas diretamente via IP real.

services:

  # ─── Ledger ─────────────────────────────────────────────────────────────────

  ledger-norte:
    profiles: [norte]
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_norte
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ID=ledger-norte
      - PORT=7007
      - GENESIS=true
      - DIFFICULTY=3
      - PEERS=172.16.201.7:7008,172.16.201.8:7011,172.16.201.16:7012

  ledger-sul:
    profiles: [sul]
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_sul
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ID=ledger-sul
      - PORT=7008
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=172.16.201.10:7007,172.16.201.8:7011,172.16.201.16:7012

  ledger-leste:
    profiles: [leste]
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_leste
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ID=ledger-leste
      - PORT=7011
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=172.16.201.10:7007,172.16.201.7:7008,172.16.201.16:7012

  ledger-oeste:
    profiles: [oeste]
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_oeste
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ID=ledger-oeste
      - PORT=7012
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=172.16.201.10:7007,172.16.201.7:7008,172.16.201.8:7011

  # ─── Brokers ─────────────────────────────────────────────────────────────────

  broker-norte:
    profiles: [norte]
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker_norte
    network_mode: host
    restart: unless-stopped
    environment:
      - SECTOR_NAME=Norte
      - PORT=5007
      - MY_IP=172.16.201.10
      - RING_ADDRS=172.16.201.10:5007,172.16.201.7:5008,172.16.201.8:5011,172.16.201.16:5012
      - LEDGER_NODES=172.16.201.10:7007,172.16.201.7:7008,172.16.201.8:7011,172.16.201.16:7012

  broker-sul:
