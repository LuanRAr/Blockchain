services:

  # ─── Ledger ─────────────────────────────────────────────────────────────────

  ledger-norte:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_norte
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ID=ledger-norte
      - PORT=7000
      - GENESIS=true
      - DIFFICULTY=3
      - PEERS=172.16.201.10:7000,172.16.201.11:7000,172.16.201.12:7000

  ledger-sul:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_sul
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ID=ledger-sul
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=172.16.201.7:7000,172.16.201.11:7000,172.16.201.12:7000

  ledger-leste:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_leste
    network_mode: host
    restart: unless-stopped
