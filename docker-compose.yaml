      - BROKER_LIST=172.16.201.10:5007,172.16.201.7:5008,172.16.201.8:5011,172.16.201.16:5012

  # ─── Drones ──────────────────────────────────────────────────────────────────

  drone-norte-01:
    profiles: [norte]
    build:
      context: .
      args:
