# docker-compose para rodar TUDO em uma única máquina (teste local).
#
# Usa rede bridge com IPs fixos (subnet 10.200.0.0/24).
# Cada serviço pode ser subido individualmente:
#
#   docker compose up --build broker-norte
#   docker compose up --build ledger-norte ledger-sul
#   docker compose up --build sensor-norte-radar drone-norte-01
#
# Ou tudo de uma vez:
#   docker compose up --build
#
# Mapa de IPs internos:
#   Ledger : norte 10.200.0.7  | sul 10.200.0.8  | leste 10.200.0.11 | oeste 10.200.0.12
#   Broker : norte 10.200.0.17 | sul 10.200.0.18 | leste 10.200.0.21 | oeste 10.200.0.22
#   Drone  : norte-01 .31, norte-02 .32 | sul-01 .33, sul-02 .34
#            leste-01 .35, leste-02 .36 | oeste-01 .37, oeste-02 .38
#
# Portas expostas no host:
#   Ledger : 7007 (norte) | 7008 (sul) | 7011 (leste) | 7012 (oeste)
#   Broker : 5007 (norte) | 5008 (sul) | 5011 (leste) | 5012 (oeste)

networks:
  ormuz:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24

services:

  # ─── Ledger ─────────────────────────────────────────────────────────────────

  ledger-norte:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_norte
    networks:
      ormuz:
        ipv4_address: 10.200.0.7
    restart: unless-stopped
    ports:
      - "7007:7000"
    environment:
      - NODE_ID=ledger-norte
      - PORT=7000
      - GENESIS=true
      - DIFFICULTY=3
      - PEERS=10.200.0.8:7000,10.200.0.11:7000,10.200.0.12:7000

  ledger-sul:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_sul
    networks:
      ormuz:
        ipv4_address: 10.200.0.8
    restart: unless-stopped
    ports:
      - "7008:7000"
    environment:
      - NODE_ID=ledger-sul
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=10.200.0.7:7000,10.200.0.11:7000,10.200.0.12:7000

  ledger-leste:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_leste
    networks:
      ormuz:
        ipv4_address: 10.200.0.11
    restart: unless-stopped
    ports:
      - "7011:7000"
    environment:
      - NODE_ID=ledger-leste
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=10.200.0.7:7000,10.200.0.8:7000,10.200.0.12:7000

  ledger-oeste:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_oeste
    networks:
      ormuz:
        ipv4_address: 10.200.0.12
    restart: unless-stopped
    ports:
      - "7012:7000"
    environment:
      - NODE_ID=ledger-oeste
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=10.200.0.7:7000,10.200.0.8:7000,10.200.0.11:7000

  # ─── Brokers ─────────────────────────────────────────────────────────────────

  broker-norte:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker_norte
    networks:
      ormuz:
        ipv4_address: 10.200.0.17
    restart: unless-stopped
    ports:
      - "5007:5000"
    environment:
      - SECTOR_NAME=Norte
      - PORT=5000
      - MY_IP=10.200.0.17
      - RING_ADDRS=10.200.0.17:5000,10.200.0.18:5000,10.200.0.21:5000,10.200.0.22:5000
      - LEDGER_NODES=10.200.0.7:7000,10.200.0.8:7000,10.200.0.11:7000,10.200.0.12:7000

  broker-sul:
