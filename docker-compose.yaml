    network_mode: host
    restart: unless-stopped
    environment:
      - SECTOR_NAME=Sul
      - PORT=5000
      - MY_IP=172.16.201.10
      - RING_ADDRS=172.16.201.7:5000,172.16.201.10:5000,172.16.201.11:5000,172.16.201.12:5000
      - LEDGER_NODES=172.16.201.7:7000,172.16.201.10:7000,172.16.201.11:7000,172.16.201.12:7000

  broker-leste:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker_leste
    network_mode: host
    restart: unless-stopped
    environment:
      - SECTOR_NAME=Leste
      - PORT=5000
      - MY_IP=172.16.201.11
      - RING_ADDRS=172.16.201.7:5000,172.16.201.10:5000,172.16.201.11:5000,172.16.201.12:5000
      - LEDGER_NODES=172.16.201.7:7000,172.16.201.10:7000,172.16.201.11:7000,172.16.201.12:7000
    
  broker-oeste:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker_oeste
    network_mode: host
    restart: unless-stopped
    environment:
      - SECTOR_NAME=Oeste
      - PORT=5000
      - MY_IP=172.16.201.12
      - RING_ADDRS=172.16.201.7:5000,172.16.201.10:5000,172.16.201.11:5000,172.16.201.12:5000
