  # ─── Cliente Interativo ───────────────────────────────────────────────────

  client:
    build:
      context: .
      args:
        TARGET: client
    container_name: ormuz_client
    networks:
      - ormuz
    stdin_open: true  # mantém stdin aberto para o menu interativo
    tty: true         # aloca pseudo-TTY para formatação correta do terminal
    environment:
      #   NavegacaoNorte | NavegacaoSul | NavegacaoLeste | NavegacaoOeste | ConsorcioGeral
      - COMPANY=NavegacaoNorte
      - LEDGER_NODES=10.200.0.7:7000,10.200.0.8:7000,10.200.0.10:7000,10.200.0.16:7000
      - BROKER_LIST=10.200.0.17:5000,10.200.0.18:5000,10.200.0.20:5000,10.200.0.26:5000