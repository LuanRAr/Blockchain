    restart: unless-stopped
    environment:
      - SECTOR_NAME=Oeste
      - SENSOR_TYPE=Radar
      - BROKER_LIST=10.200.0.17:5000,10.200.0.18:5000,10.200.0.21:5000,10.200.0.22:5000

  sensor-oeste-naval:
    build:
      context: .
