      - SENSOR_TYPE=Naval
      - BROKER_LIST=10.200.0.17:5000,10.200.0.18:5000,10.200.0.21:5000,10.200.0.22:5000

  # ─── Drones ──────────────────────────────────────────────────────────────────

  drone-norte-01:
    build:
      context: .
      args:
        TARGET: drone
    container_name: drone_norte_01
