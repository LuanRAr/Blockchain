      ormuz:
        ipv4_address: 10.200.0.31
    restart: unless-stopped
    environment:
      - SECTOR_NAME=Norte
      - DRONE_ID=DRONE-NORTE-A
      - DRONE_PORT=6000
      - MY_IP=10.200.0.31
