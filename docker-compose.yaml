      - LEDGER_NODES=10.200.0.7:7000,10.200.0.8:7000,10.200.0.10:7000,10.200.0.16:7000

  broker-oeste:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker_oeste
    networks:
      ormuz:
        ipv4_address: 10.200.0.26
    restart: unless-stopped
