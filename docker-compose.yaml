networks:
  ormuz:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24

services:

  # ─── Ledger ─────────────────────────────────────────────────────────────────

  ledger-norte:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_norte
    networks:
      ormuz:
        ipv4_address: 10.200.0.7
    restart: unless-stopped
    ports:
      - "7007:7000"
    environment:
      - NODE_ID=ledger-norte
      - PORT=7000
      - GENESIS=true
      - DIFFICULTY=3
      - PEERS=10.200.0.8:7000,10.200.0.10:7000,10.200.0.16:7000

  ledger-sul:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_sul
    networks:
      ormuz:
        ipv4_address: 10.200.0.8
    restart: unless-stopped
    ports:
      - "7008:7000"
    environment:
      - NODE_ID=ledger-sul
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=10.200.0.7:7000,10.200.0.10:7000,10.200.0.16:7000

  ledger-leste:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_leste
    networks:
      ormuz:
        ipv4_address: 10.200.0.10
    restart: unless-stopped
    ports:
      - "7010:7000"
    environment:
      - NODE_ID=ledger-leste
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=10.200.0.7:7000,10.200.0.8:7000,10.200.0.16:7000

  ledger-oeste:
    build:
      context: .
      args:
        TARGET: ledger
    container_name: ledger_oeste
    networks:
      ormuz:
        ipv4_address: 10.200.0.16
    restart: unless-stopped
    ports:
      - "7016:7000"
    environment:
      - NODE_ID=ledger-oeste
      - PORT=7000
      - GENESIS=false
      - DIFFICULTY=3
      - PEERS=10.200.0.7:7000,10.200.0.8:7000,10.200.0.10:7000

  # ─── Brokers ─────────────────────────────────────────────────────────────────

  broker-norte:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker_norte
    networks:
      ormuz:
        ipv4_address: 10.200.0.17
    restart: unless-stopped
    ports:
      - "5007:5000"
    environment:
      - SECTOR_NAME=Norte
      - PORT=5000
      - MY_IP=10.200.0.17
      - RING_ADDRS=10.200.0.17:5000,10.200.0.18:5000,10.200.0.20:5000,10.200.0.26:5000
      - LEDGER_NODES=10.200.0.7:7000,10.200.0.8:7000,10.200.0.10:7000,10.200.0.16:7000

